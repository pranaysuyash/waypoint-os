<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

function renderLeft(){

  selectedId = id;

function runNext(id){
  const t = trips[id];
  if(t.next.template){
    document.getElementById('cmd').value = `/message ${t.next.template}`;
    document.getElementById('cmd').focus();
    showPalette();
    toast('Template loaded in command bar');
  }else{
    toast(`${t.next.label} — opened`);
  }
}

function quickAction(a){ toast(`${a} — opened for ${trips[selectedId].name}`) }

function toast(msg){
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'), 2200);
}

// Commands
const commands = [
  {cmd:'/quote', desc:'Create new quote', run:()=>toast('Quote builder opened')},
  {cmd:'/message', desc:'Send WhatsApp / Email', run:()=>toast('Composer opened')},
  {cmd:'/hold', desc:'Put trip on hold', run:()=>toast('Trip on hold')},
  {cmd:'/escalate', desc:'Escalate to manager', run:()=>toast('Escalated to VP Ops')},
  {cmd:'/docs', desc:'Request documents', run:()=>toast('Document request sent')},
  {cmd:'/call', desc:'Log a call', run:()=>toast('Call logged')},
  {cmd:'/clone', desc:'Clone this trip', run:()=>toast('Trip cloned')},
  {cmd:'/lost', desc:'Mark as lost', run:()=>toast('Marked lost')},
];
const cmdInput = document.getElementById('cmd');
const palette = document.getElementById('cmdPalette');

function showPalette(){
  const v = cmdInput.value.toLowerCase();
  const list = commands.filter(c=>!v || c.cmd.startsWith(v) || v==='/');
  palette.innerHTML = `<div class="max-h-[240px] overflow-y-auto py-1">${list.map(c=>`<button data-cmd="${c.cmd}" class="w-full text-left px-2.5 py-1.5 hover:bg-zinc-800 flex items-center justify-between"><span class="mono text-[12px] text-zinc-200">${c.cmd}</span><span class="text-[11px] text-zinc-500">${c.desc}</span></button>`).join('')}</div>`;
  palette.classList.remove('hidden');
  palette.querySelectorAll('button').forEach(b=>b.onclick=()=>{ cmdInput.value = b.dataset.cmd + ' '; cmdInput.focus(); hidePalette(); });
}
function hidePalette(){ palette.classList.add('hidden') }
function runCmd(c){ cmdInput.value=c+' '; cmdInput.focus(); showPalette(); }

cmdInput.addEventListener('focus', ()=> cmdInput.value.startsWith('/') && showPalette());
cmdInput.addEventListener('input', ()=> cmdInput.value.startsWith('/') ? showPalette() : hidePalette());
cmdInput.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    const v = cmdInput.value.trim();
    const found = commands.find(c=>v.startsWith(c.cmd));
    if(found){ found.run(); toast(`Ran ${found.cmd}`); }
    else if(v.startsWith('/message')){ toast('Message sent'); }
    cmdInput.value=''; hidePalette();
  }
  if(e.key==='Escape') hidePalette();
});
document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement!==cmdInput){ e.preventDefault(); cmdInput.focus(); cmdInput.value='/'; showPalette(); }
  if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); document.getElementById('globalSearch').focus(); }
});
