<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Agency Agent — Workflow & Component Map</title>
<style>
  :root {
    --bg: #0f172a;
    --bg2: #1e293b;
    --bg3: #334155;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent: #818cf8;
    --accent2: #38bdf8;
    --border: #475569;
    --success: #4ade80;
    --warning: #fbbf24;
    --danger: #f87171;
    --surface: rgba(30,41,59,0.85);
    --glow: 0 0 20px rgba(129,140,248,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  #app { display:flex; height:100vh; width:100vw; }

  /* === LEFT SIDEBAR === */
  .sidebar {
    width: 340px; min-width: 340px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-header h1 {
    font-size: 16px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sidebar-header p {
    font-size: 11px; color: var(--text-muted); margin-top: 4px;
  }
  .sidebar-search {
    padding: 12px 20px; flex-shrink: 0;
  }
  .sidebar-search input {
    width: 100%; padding: 8px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 13px; outline: none;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--text-muted); }
  .sidebar-nav {
    flex: 1; overflow-y: auto; padding: 8px 12px;
  }
  .sidebar-nav::-webkit-scrollbar { width: 4px; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .nav-section { margin-bottom: 16px; }
  .nav-section-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text-muted); padding: 8px 8px 4px; font-weight: 600;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
    transition: all 0.15s; margin-bottom: 2px;
    font-size: 13px; color: var(--text-muted);
  }
  .nav-item:hover { background: rgba(129,140,248,0.08); color: var(--text); }
  .nav-item.active { background: rgba(129,140,248,0.15); color: var(--accent); border-left: 3px solid var(--accent); }
  .nav-item .dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--border);
  }
  .nav-item:hover .dot, .nav-item.active .dot { border-color: currentColor; }
  .nav-item .badge {
    font-size: 10px; background: var(--bg3); padding: 1px 6px;
    border-radius: 10px; color: var(--text-muted); margin-left: auto;
  }

  /* === MAIN CANVAS === */
  .canvas-container {
    flex: 1; position: relative; overflow: hidden;
    background:
      radial-gradient(circle at 20% 50%, rgba(129,140,248,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 50%, rgba(56,189,248,0.04) 0%, transparent 50%),
      var(--bg);
  }
  svg#graph { width: 100%; height: 100%; }

  /* === NODE STYLES === */
  .node { cursor: pointer; }
  .node rect {
    rx: 6; ry: 6;
    stroke-width: 1.5;
    transition: all 0.2s;
  }
  .node:hover rect { filter: brightness(1.2); stroke-width: 2; }
  .node.selected rect { filter: brightness(1.35); stroke: var(--accent); stroke-width: 2.5; }
  .node text {
    fill: var(--text); font-size: 11px; font-weight: 500;
    pointer-events: none;
  }
  .node .title { font-weight: 600; font-size: 12px; }
  .node .desc { font-size: 10px; fill: var(--text-muted); }
  .pkg-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; fill: var(--text-muted);
  }

  /* === EDGE STYLES === */
  .edge { fill: none; stroke-width: 1.5; opacity: 0.4; }
  .edge.highlighted { opacity: 1; stroke-width: 3; filter: url(#glow); }
  .edge.dimmed { opacity: 0.08; }
  .edge-label {
    font-size: 9px; fill: var(--text-muted);
    pointer-events: none;
  }
  .edge-label.highlighted { fill: var(--accent); font-weight: 600; }

  /* === TOOLTIP === */
  .tooltip {
    position: fixed; pointer-events: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    max-width: 360px; min-width: 240px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 100; display: none;
    backdrop-filter: blur(12px);
  }
  .tooltip.visible { display: block; }
  .tooltip h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .tooltip p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .tooltip .data-flow {
    margin-top: 8px; padding: 8px 10px;
    background: rgba(129,140,248,0.08); border-radius: 6px;
    font-size: 11px; color: var(--accent2);
    border-left: 3px solid var(--accent);
  }
  .tooltip .data-flow strong { color: var(--text); }

  /* === DETAIL PANEL === */
  .detail-panel {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: 380px; background: var(--bg2);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 50; overflow-y: auto;
    padding: 24px;
  }
  .detail-panel.open { transform: translateX(0); }
  .detail-panel .close-btn {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: var(--text-muted);
    font-size: 20px; cursor: pointer; padding: 4px;
  }
  .detail-panel .close-btn:hover { color: var(--text); }
  .detail-panel h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .detail-panel .meta { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
  .detail-panel .section {
    margin-bottom: 20px; padding: 16px;
    background: var(--bg); border-radius: 8px;
    border: 1px solid var(--border);
  }
  .detail-panel .section h4 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-muted); margin-bottom: 10px;
  }
  .detail-panel .section p, .detail-panel .section li {
    font-size: 13px; line-height: 1.6; color: var(--text);
  }
  .detail-panel .section ul { list-style: none; padding: 0; }
  .detail-panel .section li { padding: 4px 0; border-bottom: 1px solid rgba(71,85,105,0.3); }
  .detail-panel .section li:last-child { border-bottom: none; }
  .detail-panel .flow-step {
    display: flex; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid rgba(71,85,105,0.2);
  }
  .detail-panel .flow-step:last-child { border-bottom: none; }
  .detail-panel .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
  }
  .detail-panel .step-content { flex: 1; }
  .detail-panel .step-content h5 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .detail-panel .step-content p { font-size: 12px; color: var(--text-muted); margin: 0; }
  .detail-panel .step-content .data {
    font-size: 11px; color: var(--accent2);
    background: rgba(56,189,248,0.08); padding: 4px 8px;
    border-radius: 4px; display: inline-block; margin-top: 4px;
  }
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; margin: 2px;
  }
  .tag-input { background: rgba(74,222,128,0.15); color: var(--success); }
  .tag-output { background: rgba(129,140,248,0.15); color: var(--accent); }
  .tag-process { background: rgba(251,191,36,0.15); color: var(--warning); }

  /* === BUTTONS & CONTROLS === */
  .controls {
    position: absolute; top: 16px; left: 16px;
    display: flex; gap: 8px; z-index: 20;
  }
  .ctrl-btn {
    padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 12px;
    cursor: pointer; transition: all 0.15s; backdrop-filter: blur(8px);
  }
  .ctrl-btn:hover { background: var(--bg3); border-color: var(--accent); }
  .ctrl-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* === WORKFLOW SELECTOR === */
  .workflow-selector {
    position: absolute; top: 16px; right: 16px;
    z-index: 20;
  }
  .workflow-selector select {
    padding: 8px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 12px; outline: none;
    cursor: pointer; min-width: 260px;
    backdrop-filter: blur(8px);
  }

  /* === LEGEND === */
  .legend {
    position: absolute; bottom: 16px; left: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; z-index: 20;
    backdrop-filter: blur(8px);
  }
  .legend h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; margin-bottom: 4px; color: var(--text-muted); }
  .legend-swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }

  /* === STATS BAR === */
  .stats-bar {
    position: absolute; bottom: 16px; right: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; z-index: 20;
    backdrop-filter: blur(8px); font-size: 11px;
  }
  .stats-bar .stat { display: flex; justify-content: space-between; gap: 24px; margin-bottom: 2px; color: var(--text-muted); }
  .stats-bar .stat-val { color: var(--text); font-weight: 600; }

  /* === SEARCH OVERLAY === */
  .search-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15,23,42,0.95); z-index: 200;
    display: none; align-items: center; justify-content: center;
  }
  .search-overlay.visible { display: flex; }
  .search-box {
    width: 500px; max-width: 90vw;
  }
  .search-box input {
    width: 100%; padding: 14px 18px; font-size: 18px;
    border: 2px solid var(--accent); border-radius: 12px;
    background: var(--bg2); color: var(--text); outline: none;
  }
  .search-results {
    margin-top: 8px; background: var(--bg2); border-radius: 8px;
    border: 1px solid var(--border); max-height: 300px; overflow-y: auto;
  }
  .search-result-item {
    padding: 10px 16px; cursor: pointer; font-size: 13px;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .search-result-item:hover { background: rgba(129,140,248,0.1); }
  .search-result-item .pkg-name { font-size: 11px; color: var(--accent); margin-bottom: 2px; }

  /* === ANIMATIONS === */
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  .pulsing { animation: pulse 2s infinite; }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .detail-panel.open { animation: slideIn 0.3s ease; }

  /* scrollbar styling */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>⛅ Workflow Map</h1>
      <p>Travel Agency Agent Architecture</p>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search components & flows…" oninput="handleSearch()" />
    </div>
    <div class="sidebar-nav" id="sidebarNav">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-container" id="canvas">
    <svg id="graph">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3" />
        </filter>
      </defs>
    </svg>

    <!-- CONTROLS -->
    <div class="controls">
      <button class="ctrl-btn" onclick="zoomIn()">+ Zoom</button>
      <button class="ctrl-btn" onclick="zoomOut()">− Zoom</button>
      <button class="ctrl-btn" onclick="resetView()">↺ Reset</button>
      <button class="ctrl-btn" id="toggleLabels" onclick="toggleLabels()">Labels</button>
      <button class="ctrl-btn" onclick="document.getElementById('searchOverlay').classList.toggle('visible')">⌕ Search</button>
    </div>

    <!-- WORKFLOW SELECTOR -->
    <div class="workflow-selector">
      <select id="workflowSelect" onchange="selectWorkflow()">
        <option value="all">All Workflows</option>
      </select>
    </div>

    <!-- LEGEND -->
    <div class="legend">
      <h4>Legend</h4>
      <div class="legend-item"><div class="legend-swatch" style="background:#4f46e5"></div> Intake Pipeline</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#059669"></div> Agent Runtime</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#d97706"></div> Suitability</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#7c3aed"></div> Decision Engine</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#0891b2"></div> Fees & Pricing</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#be185d"></div> Analytics</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#dc2626"></div> Security</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#0d9488"></div> LLM Extraction</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#9333ea"></div> LLM Core</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#ea580c"></div> Services</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#6366f1"></div> Schemas</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#db2777"></div> Evals</div>
    </div>

    <!-- STATS -->
    <div class="stats-bar" id="statsBar">
      <div class="stat"><span>Components</span><span class="stat-val" id="statComponents">0</span></div>
      <div class="stat"><span>Workflows</span><span class="stat-val" id="statWorkflows">0</span></div>
      <div class="stat"><span>Data Edges</span><span class="stat-val" id="statEdges">0</span></div>
      <div class="stat"><span>Selected Flow</span><span class="stat-val" id="statFlow">—</span></div>
    </div>

    <!-- SEARCH OVERLAY -->
    <div class="search-overlay" id="searchOverlay">
      <div class="search-box">
        <input type="text" id="globalSearch" placeholder="Search components, workflows…" oninput="filterSearch()" />
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <button class="close-btn" onclick="closeDetail()">✕</button>
    <div id="detailContent"></div>
  </div>

  <!-- TOOLTIP -->
  <div class="tooltip" id="tooltip">
    <h3 id="tooltipTitle"></h3>
    <p id="tooltipDesc"></p>
    <div class="data-flow" id="tooltipData"></div>
  </div>
</div>

function computeLayout() {
  const packages = Object.entries(DATA.packages);
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  const radius = Math.min(cx, cy) * 0.65;
  const pkgPositions = {};
  packages.forEach(([pkgId, pkg], i) => {
    const angle = (i / packages.length) * Math.PI * 2 - Math.PI / 2;
    pkgPositions[pkgId] = { x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius };
  });
  const nodes = [], edges = [], componentMap = {};
  packages.forEach(([pkgId, pkg]) => {
    const pc = pkgPositions[pkgId];
    const comps = pkg.components || [];
    const cr = Math.min(180, 60 + comps.length * 12);
    comps.forEach((comp, i) => {
      const angle = comps.length === 1 ? 0 : (i / comps.length) * Math.PI * 2;
      nodes.push({
        id: comp.id, label: comp.label, desc: comp.desc,
        package: pkgId, pkgLabel: pkg.label,
        x: pc.x + Math.cos(angle) * cr, y: pc.y + Math.sin(angle) * cr,
        color: PACKAGE_COLORS[pkgId] || '#6366f1',
        width: Math.max(120, comp.label.length * 6.5 + 20), height: 44
      });
      componentMap[comp.id] = nodes[nodes.length - 1];
    });
  });
  DATA.workflows.forEach(wf => {
    wf.edges.forEach(e => {
      edges.push({ id: wf.id + '-' + e.from + '-' + e.to, from: e.from, to: e.to, data: e.data, workflow: wf.id, workflowLabel: wf.label });
    });
  });
  return { nodes, edges, pkgPositions, componentMap };
}

function computeWorkflowLayout(wfId) {
  const wf = DATA.workflows.find(w => w.id === wfId);
  if (!wf) return null;
  const stepComps = wf.steps.map(s => s.component);
  const edgeComps = new Set();
  wf.edges.forEach(e => { edgeComps.add(e.from); edgeComps.add(e.to); });
  const allIds = new Set([...stepComps, ...edgeComps]);
  const fullLayout = computeLayout();
  const relevantNodes = [], relevantEdges = [], wComponentMap = {};
  fullLayout.nodes.forEach(n => {
    if (allIds.has(n.id)) { relevantNodes.push({...n}); wComponentMap[n.id] = relevantNodes[relevantNodes.length - 1]; }
  });
  fullLayout.edges.forEach(e => { if (e.workflow === wfId) relevantEdges.push({...e}); });
  const stepOrder = {};
  wf.steps.forEach((s, i) => { if (!(s.component in stepOrder)) stepOrder[s.component] = i; });
  const columns = {};
  wf.steps.forEach((s, i) => { if (!columns[i]) columns[i] = new Set(); columns[i].add(s.component); });
  const colCount = Object.keys(columns).length || 1;
  const viewW = Math.max(window.innerWidth - 400, 800);
  const viewH = Math.max(window.innerHeight - 100, 600);
  const colSpacing = viewW / (colCount + 1);
  const startY = 80;
  Object.keys(columns).forEach(col => {
    const colIdx = parseInt(col);
    const nodeIds = [...columns[col]];
    const x = (colIdx + 1) * colSpacing + 200;
    nodeIds.forEach((nid, rowIdx) => {
      const node = wComponentMap[nid];
      if (node) {
        const yOffset = (rowIdx - (nodeIds.length - 1) / 2) * 70;
        node.x = x;
        node.y = startY + viewH / 2 + yOffset;
      }
    });
  });
  relevantNodes.forEach(node => {
    if (node.id in stepOrder) return;
    const inEdges = relevantEdges.filter(e => e.to === node.id);
    const outEdges = relevantEdges.filter(e => e.from === node.id);
    if (inEdges.length > 0) {
      const fromNode = wComponentMap[inEdges[0].from];
      if (fromNode && fromNode.x !== undefined) { node.x = fromNode.x + colSpacing * 0.5; node.y = fromNode.y + 40; }
    } else if (outEdges.length > 0) {
      const toNode = wComponentMap[outEdges[0].to];
      if (toNode && toNode.x !== undefined) { node.x = toNode.x - colSpacing * 0.5; node.y = toNode.y - 40; }
    }
  });
  const positioned = relevantNodes.filter(n => n.x !== undefined && n.y !== undefined);
  return { nodes: positioned, edges: relevantEdges, pkgPositions: fullLayout.pkgPositions, componentMap: wComponentMap };
}

let layout;
const svg = document.getElementById('graph');
const NS = 'http://www.w3.org/2000/svg';
function createSVGElement(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  Object.entries(attrs || {}).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

function renderAll() {
  svg.innerHTML = '';
  const defs = createSVGElement('defs', {});
  defs.innerHTML = '<filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="currentColor" opacity="0.5"/></marker>';
  svg.appendChild(defs);
  const isWorkflowView = currentWorkflow !== 'all';
  const activeLayout = isWorkflowView ? (computeWorkflowLayout(currentWorkflow) || layout) : layout;
  activeLayout.edges.forEach(edge => {
    const fromNode = activeLayout.componentMap[edge.from];
    const toNode = activeLayout.componentMap[edge.to];
    if (!fromNode || !toNode) return;
    if (isWorkflowView && edge.workflow !== currentWorkflow) return;
    const x1 = fromNode.x + fromNode.width / 2, y1 = fromNode.y + fromNode.height / 2;
    const x2 = toNode.x - toNode.width / 2, y2 = toNode.y + toNode.height / 2;
    const color = EDGE_COLORS[edge.workflow] || '#475569';
    const isHighlighted = highlightedEdges.has(edge.id);
    const line = createSVGElement('line', { x1, y1, x2, y2, class: 'edge' + (isHighlighted ? ' highlighted' : ''), stroke: color, 'data-workflow': edge.workflow, 'marker-end': 'url(#arrowhead)' });
    svg.appendChild(line);
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    const label = createSVGElement('text', { x: mx, y: my - 6, class: 'edge-label' + (isHighlighted ? ' highlighted' : ''), 'text-anchor': 'middle' });
    label.textContent = edge.data;
    svg.appendChild(label);
  });
  activeLayout.nodes.forEach(node => {
    if (isWorkflowView && !activeLayout.componentMap[node.id]) return;
    const g = createSVGElement('g', { class: 'node' + (selectedNode === node.id ? ' selected' : ''), transform: 'translate(' + (node.x - node.width/2) + ',' + (node.y - node.height/2) + ')', 'data-id': node.id, 'data-package': node.package });
    g.appendChild(createSVGElement('rect', { x: 0, y: 0, width: node.width, height: node.height, fill: node.color, 'fill-opacity': 0.15, stroke: node.color, 'stroke-opacity': 0.6, rx: 6, ry: 6 }));
    const title = createSVGElement('text', { x: node.width / 2, y: 18, class: 'title', 'text-anchor': 'middle', fill: node.color });
    title.textContent = truncate(node.label, 20);
    g.appendChild(title);
    const desc = createSVGElement('text', { x: node.width / 2, y: 34, class: 'desc', 'text-anchor': 'middle' });
    desc.textContent = truncate(node.desc, 35);
    g.appendChild(desc);
    g.addEventListener('mouseenter', (e) => onNodeHover(node, e));
    g.addEventListener('mouseleave', () => onNodeLeave());
    g.addEventListener('click', (e) => onNodeClick(node, e));
    svg.appendChild(g);
  });
  if (showLabels && !isWorkflowView) {
    Object.entries(DATA.packages).forEach(([pkgId, pkg]) => {
      const pos = layout.pkgPositions[pkgId];
      const label = createSVGElement('text', { x: pos.x, y: pos.y - 110, class: 'pkg-label', 'text-anchor': 'middle', fill: PACKAGE_COLORS[pkgId] || '#6366f1' });
      label.textContent = pkg.label;
      svg.appendChild(label);
    });
  }
  if (isWorkflowView) {
    const wf = DATA.workflows.find(w => w.id === currentWorkflow);
    if (wf) {
      const t = createSVGElement('text', { x: window.innerWidth / 2 - 170, y: 35, class: 'pkg-label', 'text-anchor': 'middle', fill: EDGE_COLORS[wf.id] || '#818cf8', 'font-size': '14px' });
      t.textContent = wf.icon + ' ' + wf.label;
      svg.appendChild(t);
    }
  }
}

function truncate(str, len) { return str.length > len ? str.substring(0, len - 3) + '\u2026' : str; }

function onNodeHover(node, e) {
  hoveredNode = node;
  document.getElementById('tooltipTitle').textContent = node.label;
  document.getElementById('tooltipDesc').textContent = node.desc;
  const connected = layout.edges.filter(ed => ed.from === node.id || ed.to === node.id).map(ed => ed.workflowLabel).filter((v, i, a) => a.indexOf(v) === i);
  document.getElementById('tooltipData').innerHTML = '<strong>Package:</strong> ' + node.pkgLabel + '<br/><strong>Workflows:</strong> ' + (connected.join(', ') || 'None');
  const tooltip = document.getElementById('tooltip');
  tooltip.classList.add('visible');
  tooltip.style.left = (e.clientX + 16) + 'px';
  tooltip.style.top = (e.clientY + 16) + 'px';
}

function onNodeLeave() { hoveredNode = null; document.getElementById('tooltip').classList.remove('visible'); }

function onNodeClick(node, e) {
  e.stopPropagation();
  selectedNode = selectedNode === node.id ? null : node.id;
  openDetail(node);
  highlightNodeConnections(node.id);
  renderAll();
}

function highlightNodeConnections(nodeId) {
  highlightedEdges.clear();
  layout.edges.forEach(edge => { if (edge.from === nodeId || edge.to === nodeId) highlightedEdges.add(edge.id); });
}

function openDetail(node) {
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  const relatedWorkflows = [...new Set(layout.edges.filter(ed => ed.from === node.id || ed.to === node.id).map(ed => ed.workflow))];
  const relatedFlowDetails = relatedWorkflows.map(wfId => DATA.workflows.find(w => w.id === wfId)).filter(Boolean);
  let html = '<h2>' + node.label + '</h2><div class="meta">' + node.pkgLabel + ' package</div><div class="section"><h4>Description</h4><p>' + node.desc + '</p></div>';
  if (relatedFlowDetails.length > 0) {
    html += '<div class="section"><h4>Connected Workflows</h4><ul>';
    relatedFlowDetails.forEach(wf => { html += '<li><strong style="color:' + (EDGE_COLORS[wf.id] || '#818cf8') + '">' + wf.icon + ' ' + wf.label + '</strong><br/><span style="font-size:11px;color:var(--text-muted)">' + wf.description + '</span></li>'; });
    html += '</ul></div>';
  }
  const connectedEdges = layout.edges.filter(ed => ed.from === node.id || ed.to === node.id);
  if (connectedEdges.length > 0) {
    html += '<div class="section"><h4>Data Handoffs</h4>';
    connectedEdges.forEach(ed => {
      const dir = ed.from === node.id ? '\u2192 Out' : '\u2190 In';
      const otherId = ed.from === node.id ? ed.to : ed.from;
      const other = layout.componentMap[otherId];
      html += '<div style="margin-bottom:8px;"><span style="font-size:11px;color:' + (EDGE_COLORS[ed.workflow] || '#818cf8') + ';font-weight:600">' + ed.workflowLabel + '</span><br/><span style="font-size:11px;color:var(--text-muted)">' + dir + ': <strong>' + (other ? other.label : otherId) + '</strong> \u2014 ' + ed.data + '</span></div>';
    });
    html += '</div>';
  }
  content.innerHTML = html;
  panel.classList.add('open');
}

function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); selectedNode = null; highlightedEdges.clear(); renderAll(); }

function selectWorkflow() {
  currentWorkflow = document.getElementById('workflowSelect').value;
  const wf = DATA.workflows.find(w => w.id === currentWorkflow);
  document.getElementById('statFlow').textContent = wf ? wf.label : '\u2014';
  if (currentWorkflow !== 'all') {
    const wLayout = computeWorkflowLayout(currentWorkflow);
    if (wLayout && wLayout.nodes.length > 0) {
      const xs = wLayout.nodes.map(n => n.x), ys = wLayout.nodes.map(n => n.y);
      const minX = Math.min(...xs) - 100, maxX = Math.max(...xs) + 200;
      const minY = Math.min(...ys) - 80, maxY = Math.max(...ys) + 80;
      const contentW = maxX - minX, contentH = maxY - minY;
      const viewW = window.innerWidth - 380, viewH = window.innerHeight;
      const scale = Math.min(viewW / contentW, viewH / contentH, 1.5);
      const centerX = (minX + maxX) / 2, centerY = (minY + maxY) / 2;
      transform.k = scale;
      transform.x = viewW / 2 + 170 - centerX * scale;
      transform.y = viewH / 2 - centerY * scale;
      applyTransform();
    }
  } else {
    transform = { x: 0, y: 0, k: 1 };
    applyTransform();
  }
  renderAll();
}

function zoomIn() { transform.k = Math.min(3, transform.k * 1.2); applyTransform(); }
function zoomOut() { transform.k = Math.max(0.3, transform.k / 1.2); applyTransform(); }
function resetView() { transform = { x: 0, y: 0, k: 1 }; applyTransform(); }
function applyTransform() { svg.style.transform = 'translate(' + transform.x + 'px,' + transform.y + 'px) scale(' + transform.k + ')'; svg.style.transformOrigin = '0 0'; }
function toggleLabels() { showLabels = !showLabels; document.getElementById('toggleLabels').classList.toggle('active', showLabels); renderAll(); }

let isPanning = false, panStart = { x: 0, y: 0 };
const canvas = document.getElementById('canvas');
canvas.addEventListener('mousedown', e => { if (e.target === canvas || e.target === svg || e.target.tagName === 'svg') { isPanning = true; panStart = { x: e.clientX - transform.x, y: e.clientY - transform.y }; canvas.style.cursor = 'grabbing'; } });
canvas.addEventListener('mousemove', e => { if (isPanning) { transform.x = e.clientX - panStart.x; transform.y = e.clientY - panStart.y; applyTransform(); } });
canvas.addEventListener('mouseup', () => { isPanning = false; canvas.style.cursor = 'grab'; });
canvas.addEventListener('wheel', e => { e.preventDefault(); transform.k = Math.min(3, Math.max(0.3, transform.k * (e.deltaY > 0 ? 0.9 : 1.1))); applyTransform(); }, { passive: false });

function handleSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(item => { item.style.display = item.textContent.toLowerCase().includes(q) ? '' : 'none'; });
}

function filterSearch() {
  const q = document.getElementById('globalSearch').value.toLowerCase();
  const resultsEl = document.getElementById('searchResults');
  resultsEl.innerHTML = '';
  if (q.length < 2) return;
  Object.entries(DATA.packages).forEach(([pkgId, pkg]) => {
    (pkg.components || []).forEach(comp => {
      if (comp.label.toLowerCase().includes(q) || comp.desc.toLowerCase().includes(q)) {
        const div = document.createElement('div');
        div.className = 'search-result-item';
        div.innerHTML = '<div class="pkg-name">' + pkg.label + '</div><div>' + comp.label + '</div>';
        div.onclick = () => { document.getElementById('searchOverlay').classList.remove('visible'); document.getElementById('globalSearch').value = ''; const node = layout.componentMap[comp.id]; if (node) { transform.x = window.innerWidth / 2 - node.x * transform.k; transform.y = window.innerHeight / 2 - node.y * transform.k; applyTransform(); onNodeClick(node, {}); } };
        resultsEl.appendChild(div);
      }
    });
  });
  DATA.workflows.forEach(wf => {
    if (wf.label.toLowerCase().includes(q) || wf.description.toLowerCase().includes(q)) {
      const div = document.createElement('div');
      div.className = 'search-result-item';
      div.innerHTML = '<div class="pkg-name">Workflow</div><div>' + wf.label + '</div>';
      div.onclick = () => { document.getElementById('searchOverlay').classList.remove('visible'); document.getElementById('globalSearch').value = ''; document.getElementById('workflowSelect').value = wf.id; currentWorkflow = wf.id; document.getElementById('statFlow').textContent = wf.label; selectWorkflow(); };
      resultsEl.appendChild(div);
    }
  });
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  const wfSection = document.createElement('div');
  wfSection.className = 'nav-section';
  wfSection.innerHTML = '<div class="nav-section-title">Workflows</div>';
  const allWfItem = document.createElement('div');
  allWfItem.className = 'nav-item active';
  allWfItem.innerHTML = '<div class="dot" style="background:var(--accent)"></div> All Workflows <span class="badge">' + DATA.workflows.length + '</span>';
  allWfItem.onclick = () => { currentWorkflow = 'all'; document.getElementById('workflowSelect').value = 'all'; document.getElementById('statFlow').textContent = '\u2014'; document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); allWfItem.classList.add('active'); transform = { x: 0, y: 0, k: 1 }; applyTransform(); renderAll(); };
  wfSection.appendChild(allWfItem);
  DATA.workflows.forEach(wf => {
    const item = document.createElement('div');
    item.className = 'nav-item';
    const color = EDGE_COLORS[wf.id] || '#818cf8';
    item.innerHTML = '<div class="dot" style="background:' + color + '"></div> ' + wf.icon + ' ' + wf.label + ' <span class="badge">' + wf.steps.length + ' steps</span>';
    item.onclick = () => { currentWorkflow = wf.id; document.getElementById('workflowSelect').value = wf.id; document.getElementById('statFlow').textContent = wf.label; document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); item.classList.add('active'); selectWorkflow(); };
    wfSection.appendChild(item);
  });
  nav.appendChild(wfSection);
  const pkgSection = document.createElement('div');
  pkgSection.className = 'nav-section';
  pkgSection.innerHTML = '<div class="nav-section-title">Packages</div>';
  Object.entries(DATA.packages).forEach(([pkgId, pkg]) => {
    const item = document.createElement('div');
    item.className = 'nav-item';
    const color = PACKAGE_COLORS[pkgId] || '#6366f1';
    item.innerHTML = '<div class="dot" style="background:' + color + '"></div> ' + pkg.label + ' <span class="badge">' + (pkg.components || []).length + '</span>';
    pkgSection.appendChild(item);
  });
  nav.appendChild(pkgSection);
}

function init() {
  layout = computeLayout();
  buildSidebar();
  renderAll();
  document.getElementById('statComponents').textContent = layout.nodes.length;
  document.getElementById('statWorkflows').textContent = DATA.workflows.length;
  document.getElementById('statEdges').textContent = layout.edges.length;
  canvas.addEventListener('click', e => { if (e.target === canvas || e.target === svg) closeDetail(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); if (e.key === '/' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); document.getElementById('searchOverlay').classList.toggle('visible'); document.getElementById('globalSearch').focus(); } });
  lastW = window.innerWidth; lastH = window.innerHeight;
}

init();
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  if (Math.abs(w - lastW) < 5 && Math.abs(h - lastH) < 5) return;
  lastW = w; lastH = h;
  layout = computeLayout();
  renderAll();
});
</script>
</body>
</html>
