services:
  postgres:
    image: postgres:16-alpine
    container_name: waypoint-postgres
    environment:
      POSTGRES_USER: waypoint
      POSTGRES_PASSWORD: waypoint_dev_password
      POSTGRES_DB: waypoint_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waypoint -d waypoint_os"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
