name: run-contract-guard

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-contract-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Backend contract guard tests
        run: |
          uv sync
          uv run pytest -q tests/test_run_contract_drift_guard.py

  frontend-route-map-guard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Route-map guard tests
        run: npm test -- --run src/lib/__tests__/route-map.test.ts
