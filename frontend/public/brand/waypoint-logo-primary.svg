<svg width="240" height="72" viewBox="0 0 240 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Waypoint OS primary logo</title>
  <desc id="desc">A compass pin mark with Waypoint OS wordmark.</desc>
