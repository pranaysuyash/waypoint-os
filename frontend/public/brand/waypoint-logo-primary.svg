    <path d="M20 9.5c-5.55 0-10.05 4.28-10.05 9.56 0 6.65 8.12 12.36 9.11 13.03.56.38 1.32.38 1.88 0 .99-.67 9.11-6.38 9.11-13.03C30.05 13.78 25.55 9.5 20 9.5Z" fill="#EAF6FF"/>
