<svg width="260" height="72" viewBox="0 0 260 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Waypoint OS primary logo</title>
  <desc id="desc">Compass-star brand mark with Waypoint OS wordmark.</desc>
  <rect width="260" height="72" rx="22" fill="#090E14"/>
  <rect x="1" y="1" width="258" height="70" rx="21" stroke="#2B3543" stroke-opacity=".85"/>
  <g transform="translate(16 16)">
    <rect width="40" height="40" rx="13" fill="#0C1520"/>
    <rect x="0.75" y="0.75" width="38.5" height="38.5" rx="12.25" stroke="#314154"/>
    <circle cx="20" cy="20" r="13.8" fill="#071018" stroke="#39D0D8" stroke-opacity=".55" stroke-width="1.6"/>
    <path d="M20 9.2L23 17L30.8 20L23 23L20 30.8L17 23L9.2 20L17 17L20 9.2Z" fill="url(#markGradient)"/>
    <circle cx="20" cy="20" r="2.8" fill="#F2FAFF"/>
